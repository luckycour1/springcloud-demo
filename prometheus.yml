global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'spring-cloud-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['gateway-service:8080', 'auth-service:8083', 'user-service:8081', 'order-service:8082']

